    SET_LED LED=th_leds INDEX=2 RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=0
    SET_LED LED=th_leds INDEX=3 RED=0 GREEN=0 BLUE=0 WHITE=0 TRANSMIT=1

