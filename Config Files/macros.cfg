[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_BASE
description: Sicherer Druckabbruch
gcode:
    END_PRINT
    CANCEL_PRINT_BASE


[gcode_macro EXHAUST_FAN]
description: Steuerung des Intake/Exhaust-Lüfters
gcode:
    {% set speed = params.SPEED|default(1.0)|float %}
    {% set speed = [[speed, 0.0]|max, 1.0]|min %}
    SET_FAN_SPEED FAN="intake_exhaust" SPEED={speed}


[delayed_gcode HOTEND_FAN_MONITOR]
initial_duration: 10
gcode:
    {% set temp = printer.extruder.temperature|float %}
    {% set rpm = printer["heater_fan hotend_fan"].rpm|default(0)|float %}
    {% set state = printer.print_stats.state|lower %}

    {% if state in ["printing", "paused"] and temp >= 80 and rpm < 1000 %}
        RESPOND TYPE=error MSG="Hotend-Lüfter ausgefallen! Druck wird abgebrochen."
        TURN_OFF_HEATERS
        CANCEL_PRINT
    {% endif %}

    UPDATE_DELAYED_GCODE ID=HOTEND_FAN_MONITOR DURATION=3